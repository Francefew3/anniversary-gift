<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anniversary For My Gift | The Final Surprise</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --rose-red: #934655; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; background: #fbf9f1; }
        .font-romantic { font-family: 'Dancing Script', cursive; }
        .glass-panel { background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.2); }
        .petal { position: fixed; top: -10%; pointer-events: none; z-index: 99; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
        .polaroid { background: white; padding: 10px 10px 40px 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); transition: all 0.4s; }
        .polaroid.viewed { border: 2px solid #934655; opacity: 0.8; }
        
        /* Video Modal Style */
        #videoModal { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; opacity: 0; transition: opacity 0.5s; }
        #videoModal.active { display: flex; opacity: 1; }
        #finalMessage { display: none; text-align: center; color: white; padding: 20px; }
    </style>
</head>
<body>

    <div id="ytPlayer" style="position:fixed; top:-999px; left:-999px;"></div>

    <div id="lockScreen" class="fixed inset-0 z-[100] flex items-center justify-center bg-gradient-to-br from-[#f8d8db] to-[#fbf9f1] p-6">
        <div class="max-w-md w-full glass-panel p-10 rounded-3xl text-center space-y-6 shadow-2xl">
            <h1 class="font-romantic text-5xl text-[#934655]">Anniversary For My Gift</h1>
            <p class="text-xs tracking-widest uppercase opacity-60">ใส่วันครบรอบ 6 หลัก (DDMMYY) </p>
            <div class="flex justify-center gap-2" id="otp-inputs">
                <input type="number" pattern="\d*" inputmode="numeric" maxlength="1" class="w-10 h-12 text-center text-xl bg-white/70 rounded-lg">
                <input type="number" pattern="\d*" inputmode="numeric" maxlength="1" class="w-10 h-12 text-center text-xl bg-white/70 rounded-lg">
                <input type="number" pattern="\d*" inputmode="numeric" maxlength="1" class="w-10 h-12 text-center text-xl bg-white/70 rounded-lg">
                <input type="number" pattern="\d*" inputmode="numeric" maxlength="1" class="w-10 h-12 text-center text-xl bg-white/70 rounded-lg">
                <input type="number" pattern="\d*" inputmode="numeric" maxlength="1" class="w-10 h-12 text-center text-xl bg-white/70 rounded-lg">
                <input type="number" pattern="\d*" inputmode="numeric" maxlength="1" class="w-10 h-12 text-center text-xl bg-white/70 rounded-lg">
            </div>
        </div>
    </div>

    <main id="mainContent" class="opacity-0 transition-opacity duration-1000 pt-20 pb-20 px-4 max-w-5xl mx-auto">
        <header class="fixed top-0 left-0 w-full h-16 flex justify-between items-center px-6 glass-panel z-50">
            <span class="font-romantic text-2xl text-[#934655]">Project Gift</span>
            <span id="progressText" class="text-xs font-bold text-[#934655]">ความทรงจำ: 0/10</span>
        </header>

        <section class="text-center mb-10 mt-10">
            <h2 class="text-2xl font-bold text-[#934655]">เปิดดูความทรงจำให้ครบนะ...</h2>
        </section>

        <div id="gallery" class="grid grid-cols-2 md:grid-cols-5 gap-4"></div>
    </main>

    <div id="videoModal">
        <div id="videoContainer" class="w-full max-w-3xl aspect-video bg-black shadow-2xl">
            <div id="specialVideo"></div>
        </div>
        
        <div id="finalMessage" class="space-y-6">
            <h2 class="font-romantic text-6xl text-[#f8d8db]">Happy Anniversary</h2>
            <p class="text-xl text-white/90 leading-relaxed max-w-lg mx-auto">
                ขอบคุณที่เป็นของขวัญที่พิเศษที่สุดในชีวิต<br>
                รักหนูมากขึ้นในทุกๆ วันนะคนเก่ง ❤️
            </p>
            <button onclick="closeVideo()" class="bg-[#934655] text-white px-8 py-3 rounded-full font-bold hover:bg-[#7a3a47] transition">
                กลับไปดูรูปอีกครั้ง
            </button>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // --- CONFIG ---
        const correctPasscode = "261159"; 
        const bgMusicID = "KM52dCm740I"; // เพลงคู่ชีวิต
        const surpriseVideoID = "Qvfac8pWYY4"; // **เปลี่ยนเป็น ID วิดีโอที่คุณอวยพรแฟน**
        const messages = ["รักหนูนะครับ 💖", "คิดถึงที่สุดเลย ✨", "ขอบคุณนะที่อยู่กับเรา 🌹", "ยิ้มเยอะๆนะคนเก่ง 😊", "จุ๊บๆ 🥂", "จับมือกันนะ 👫", "คนเก่ง 🌟", "ตัวแสบ 😋", "อยู่ด้วยกันไปนานๆ ♾️", "ที่สุดในใจเลย 🥇"];

        let bgPlayer, surprisePlayer;
        let viewedPhotos = new Set();
        let musicStarted = false;

        // --- YouTube API ---
        function onYouTubeIframeAPIReady() {
            // เพลงพื้นหลัง
            bgPlayer = new YT.Player('ytPlayer', {
                height: '0', width: '0', videoId: bgMusicID,
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': bgMusicID, 'mute': 1 }
            });

            // วิดีโอเซอร์ไพรส์
            surprisePlayer = new YT.Player('specialVideo', {
                height: '100%', width: '100%', videoId: surpriseVideoID,
                events: { 'onStateChange': onSurpriseVideoChange }
            });
        }

        function onSurpriseVideoChange(event) {
            if (event.data === YT.PlayerState.ENDED) {
                document.getElementById('videoContainer').style.display = 'none';
                document.getElementById('finalMessage').style.display = 'block';
            }
        }

        // --- Passcode Logic ---
        const inputs = document.querySelectorAll('#otp-inputs input');
        inputs.forEach((input, i) => {
            input.addEventListener('input', () => {
                if (!musicStarted && bgPlayer) { bgPlayer.unMute(); bgPlayer.playVideo(); musicStarted = true; }
                if (input.value && i < inputs.length - 1) inputs[i + 1].focus();
                const pass = Array.from(inputs).map(inp => inp.value).join('');
                if (pass === correctPasscode) {
                    document.getElementById('lockScreen').style.display = 'none';
                    document.getElementById('mainContent').style.opacity = '1';
                    initGallery();
                }
            });
        });

        function initGallery() {
            createPetals();
            const gallery = document.getElementById('gallery');
            for(let i=1; i<=10; i++) {
                const div = document.createElement('div');
                div.className = 'polaroid';
                div.style.transform = `rotate(${Math.random() * 10 - 5}deg)`;
                div.innerHTML = `<img src="images/${i}.jpg" class="w-full aspect-square object-cover mb-2" onerror="this.src='https://via.placeholder.com/150'">`;
                div.onclick = () => clickPhoto(i, div);
                gallery.appendChild(div);
            }
        }

        function clickPhoto(id, element) {
            if (!viewedPhotos.has(id)) {
                viewedPhotos.add(id);
                element.classList.add('viewed');
                document.getElementById('progressText').innerText = `ความทรงจำ: ${viewedPhotos.size}/10`;
                
                if (viewedPhotos.size === 10) {
                    setTimeout(showVideoSurprise, 1500);
                }
            }
            // แสดงข้อความสั้นๆ
            const toast = document.createElement('div');
            toast.className = 'fixed top-1/2 left-1/2 -translate-x-1/2 bg-[#934655] text-white px-6 py-2 rounded-full z-[300]';
            toast.innerText = messages[id-1];
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 1000);
        }

        function showVideoSurprise() {
            if (bgPlayer) bgPlayer.pauseVideo(); // หยุดเพลงพื้นหลัง
            const modal = document.getElementById('videoModal');
            modal.classList.add('active');
            document.getElementById('videoContainer').style.display = 'block';
            document.getElementById('finalMessage').style.display = 'none';
            surprisePlayer.playVideo();
        }

        function closeVideo() {
            document.getElementById('videoModal').classList.remove('active');
            if (bgPlayer) bgPlayer.playVideo(); // เล่นเพลงพื้นหลังต่อ
        }

        function createPetals() {
            const p = document.createElement('div');
            p.className = 'petal'; p.innerHTML = '🌸';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = (Math.random() * 3 + 5) + 's';
            document.body.appendChild(p);
            setTimeout(createPetals, 1000);
            p.addEventListener('animationend', () => p.remove());
        }
    </script>
</body>
</html>
